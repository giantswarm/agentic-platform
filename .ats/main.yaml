# app-test-suite config. Consumed by the generated `run-tests-with-ats`
# CircleCI job (execute-chart-tests for the agentic-platform meta-package chart).
# The agentic-platform-crds bundle chart has been retired (app-owned CRDs).
#
# The cluster test steps are skipped on purpose. agentic-platform is an
# app-of-apps platform meta-package: it always installs the muster subchart and
# renders CRs for ~9 external CRD families (Cilium, Kyverno, CAPI, CNPG,
# Gateway API, kagent, agentgateway, muster, Prometheus-operator). A standalone
# app-test-suite smoke on a bare kind cluster fails at install (no matching
# CRDs), so it is not the right validation model for this chart -- the same call
# the muster repo makes for its own platform chart.
#
# What still runs and gates the PR: the build-chart job (app-build-suite lint +
# package + values.schema.json validation) for both charts. Full deployment is
# validated against a real management cluster, not an ATS kind smoke.
#
# To turn on a real smoke later: drop `smoke` from skip-steps and add
# `app-tests-skip-app-deploy: true` + a tests/ats conftest that installs the
# Gateway API CRD and deploys the chart with tests/test-values.yaml (which
# already trims the render to core resources + a single HTTPRoute).
app-tests-app-config-file: tests/test-values.yaml
app-tests-deploy-namespace: agentic-platform

# EXPERIMENT (do not merge): run all three scenarios under a live Flux engine on
# kind, using the new ats GitOps bundle testing. ats installs Flux, deploys the
# bundle into agentic-platform-<engine>, and waits for every HelmRelease/
# OCIRepository to become Ready. Short bundle-ready timeout so a non-converging
# render fails fast instead of hanging the job. The tests in tests/ats (bundle
# component readiness) are the keep-worthy change; this engine/upgrade config is
# experiment-only.
smoke-tests-cluster-type: kind
functional-tests-cluster-type: kind
upgrade-tests-cluster-type: kind

smoke-tests-gitops-engines: flux
functional-tests-gitops-engines: flux
upgrade-tests-gitops-engines: flux

smoke-tests-gitops-bundle-ready-timeout: 5m
functional-tests-gitops-bundle-ready-timeout: 5m
upgrade-tests-gitops-bundle-ready-timeout: 5m

# Upgrade from the latest published stable, deployed with the same trimmed
# values as the candidate so the stable release also renders the 2-component
# bundle (without this the stable deploy renders the full meta-package and can't
# converge on kind).
upgrade-tests-app-catalog-url: https://giantswarm.github.io/giantswarm-catalog
upgrade-tests-app-version: stable
upgrade-tests-app-config-file: tests/test-values.yaml
upgrade-tests-save-metadata: false
