{{- if and .Values.klausGateway.enabled .Values.klausGateway.agentgatewayRoute.enabled }}
{{- $route := .Values.klausGateway.agentgatewayRoute }}
{{- $ns := .Values.klausGateway.namespaceOverride | default .Release.Namespace }}
{{- $fullname := .Values.klausGateway.fullnameOverride | default "klaus-gateway" }}
{{- $paths := list "/v1" "/web" "/cli/v1" }}
{{- if .Values.klausGateway.slack.enabled }}
{{- $paths = append $paths "/channels/slack" }}
{{- end }}
# AgentgatewayBackend — registers klausgateway as an agentgateway backend.
# klausgateway itself has no auth middleware; the agentgateway JWT policy
# (AgentgatewayPolicy) enforces authentication before forwarding.
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: klausgateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  static:
    host: {{ printf "%s.%s.svc.cluster.local" $fullname $ns }}
    port: 8080
---
# HTTPRoute — exposes channel paths on the agentgateway data-plane Gateway.
# No URLRewrite: klausgateway serves these paths natively.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: klausgateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
      group: gateway.networking.k8s.io
      kind: Gateway
  {{- if $route.hostname }}
  hostnames:
    - {{ $route.hostname | quote }}
  {{- end }}
  rules:
    {{- range $paths }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ . }}
      backendRefs:
        - name: klausgateway
          kind: AgentgatewayBackend
          group: agentgateway.dev
    {{- end }}
{{- if and .Values.ingress.parentRefs $route.hostname }}
---
# Layer-1 HTTPRoute — routes the public hostname to the agentgateway data-plane.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-klausgateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.ingress.parentRefs | nindent 4 }}
  hostnames:
    - {{ $route.hostname | quote }}
  rules:
    {{- range $paths }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ . }}
      backendRefs:
        - name: {{ $.Values.gateway.name }}
          port: 8080
    {{- end }}
{{- end }}
{{- end }}
{{- if and .Values.klausGateway.enabled .Values.klausGateway.obo.enabled .Values.ingress.parentRefs }}
{{- $fullname := .Values.klausGateway.fullnameOverride | default "klaus-gateway" }}
{{- $oboHost := .Values.klausGateway.obo.callbackBaseUrl | default "" | trimPrefix "https://" | trimPrefix "http://" | trimSuffix "/" }}
---
# OBO Slack-link + CIMD + connector-completion endpoints on the public
# hostname. These are the unauthenticated OAuth-bootstrap paths: the linking
# browser hits /auth/slack/link and /auth/slack/callback, muster fetches the
# CIMD document /auth/slack/client.json (whose client_id == that URL), and
# after a connector login muster redirects the browser to /connectors/complete
# (the gateway's login-completion landing). They route straight to the
# klaus-gateway Service, NOT through the agentgateway data-plane, because they
# carry no JWT and must not sit behind the policy that guards the channel
# paths. The public hostname is derived from obo.callbackBaseUrl so the route,
# the redirect URI, and the CIMD client_id all stay in lockstep.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: klausgateway-obo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.ingress.parentRefs | nindent 4 }}
  {{- if $oboHost }}
  hostnames:
    - {{ $oboHost | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth/slack/
        - path:
            type: PathPrefix
            value: /connectors/complete
      backendRefs:
        - name: {{ $fullname }}
          port: 8080
{{- end }}
