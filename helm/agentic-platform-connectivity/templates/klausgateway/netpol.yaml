{{- if and .Values.klausGateway.enabled .Values.klausGateway.a2a.enabled .Values.networkPolicy.enabled }}
{{- $agentgatewayPort := "8080" }}
{{- if eq .Values.networkPolicy.flavor "cilium" }}
---
# Allow klausgateway to reach the agentgateway data-plane for A2A egress.
# Traffic flows: klausgateway → agentgateway:8080 → kagent-controller:8083.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-klausgateway-a2a-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.klausGateway.fullnameOverride | default "klaus-gateway" | quote }}
  egress:
    {{- include "agentic-platform.dnsEgress" . | nindent 4 }}
    - toEndpoints:
        - matchLabels:
            gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
      toPorts:
        - ports:
            - port: {{ $agentgatewayPort | quote }}
              protocol: TCP
{{- else if eq .Values.networkPolicy.flavor "kubernetes" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "name" . }}-klausgateway-a2a-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.klausGateway.fullnameOverride | default "klaus-gateway" | quote }}
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
      ports:
        - port: {{ $agentgatewayPort | int }}
          protocol: TCP
{{- end }}
{{- end }}
{{- if and .Values.klausGateway.enabled .Values.klausGateway.obo.enabled .Values.networkPolicy.enabled }}
{{- if eq .Values.networkPolicy.flavor "cilium" }}
---
# Allow klausgateway Slack-OBO egress: DNS + the muster authorization server on
# :443. The gateway is a muster OAuth client; it runs RFC 8414 discovery and the
# OAuth token exchange against the PUBLIC muster URL (klausGateway.obo.musterUrl),
# because muster's discovery doc advertises its public issuer host as the
# token_endpoint. The a2a-egress policy above (or any other) puts this pod in
# Cilium default-deny egress, so without this allowance the OBO token call is
# dropped. world covers a public-NLB muster hostname (e.g. AWS); cluster + 10443
# cover a private LB VIP / Azure LB DNAT, mirroring the oauth2-proxy egress.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-klausgateway-obo-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.klausGateway.fullnameOverride | default "klaus-gateway" | quote }}
  egress:
    {{- include "agentic-platform.dnsEgress" . | nindent 4 }}
    - toEntities:
        - world
        - cluster
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "10443"
              protocol: TCP
{{- else if eq .Values.networkPolicy.flavor "kubernetes" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "name" . }}-klausgateway-obo-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.klausGateway.fullnameOverride | default "klaus-gateway" | quote }}
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: {{ toYaml .Values.networkPolicy.kubernetes.worldExcludedCIDRs | nindent 14 }}
      ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
{{- end }}
{{- if and .Values.klausGateway.enabled .Values.klausGateway.agentgatewayRoute.enabled .Values.networkPolicy.enabled }}
{{- $klausgatewayPort := "8080" }}
{{- $fullname := .Values.klausGateway.fullnameOverride | default "klaus-gateway" }}
{{- if eq .Values.networkPolicy.flavor "cilium" }}
---
# Egress from the agentgateway data-plane to klaus-gateway. The channel paths
# (/v1, /web, /cli/v1, and /channels/slack when slack.enabled) are served on the
# agentgateway data-plane Gateway and forwarded to the klaus-gateway Service. The
# data-plane runs in Cilium default-deny egress (see the -dataplane policy), whose
# cluster allowance only covers 80/443 — klaus-gateway listens on 8080, so without
# this rule the data-plane → klaus-gateway connection is dropped and the request
# fails with a 503 UpstreamFailure ("Connect: deadline has elapsed"). For Slack
# this means inbound events (delivered to the public hostname, routed through the
# data-plane) never reach the gateway, so the bot never replies. Mirrors the
# -dataplane-to-kagent allowance.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-dataplane-to-klausgateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ $fullname | quote }}
      toPorts:
        - ports:
            - port: {{ $klausgatewayPort | quote }}
              protocol: TCP
{{- else if eq .Values.networkPolicy.flavor "kubernetes" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "name" . }}-dataplane-to-klausgateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $fullname | quote }}
      ports:
        - port: {{ $klausgatewayPort | int }}
          protocol: TCP
{{- end }}
{{- end }}
