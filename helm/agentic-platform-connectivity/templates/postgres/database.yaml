{{- if .Values.postgres.enabled }}
{{- $clusterName := .Values.postgres.clusterName | default "agentic-platform-pg" }}
{{- $ns := .Values.postgres.namespace | default .Release.Namespace }}

{{- if and .Values.postgres.vector.enabled .Values.postgres.vector.extensionImage.reference }}
# CNPG Database CR for the application database — used by the ImageVolume approach
# (CNPG 1.29+ / PG 18) to instruct CNPG to run CREATE EXTENSION vector as the
# operator superuser. The `bootstrap.initdb.database` field on the Cluster CR
# creates the database itself; this CR manages extensions on top of it.
# Requires the postgresql.cnpg.io/v1 Database CRD (available since CNPG 1.19).
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: {{ $clusterName }}-kagent
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  name: {{ .Values.postgres.applicationDatabase.name | default "kagent" }}
  owner: {{ .Values.postgres.applicationDatabase.owner | default "kagent" }}
  cluster:
    name: {{ $clusterName }}
  extensions:
    - name: vector
{{- end }}

{{- if .Values.postgres.sessionsDatabase.enabled }}
# Optional Klaus resultstore database. Off by default — enable when Klaus's
# subplan-core-runtime session persistence is implemented.
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: {{ $clusterName }}-sessions
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  name: {{ .Values.postgres.sessionsDatabase.name | default "sessions" }}
  owner: {{ .Values.postgres.sessionsDatabase.owner | default "sessions" }}
  cluster:
    name: {{ $clusterName }}
{{- end }}

{{- end }}
