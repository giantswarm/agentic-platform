apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "agentic-platform.musterFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
    {{- with (include "agentic-platform.httpRouteLabels" (dict "ctx" . "route" "muster")) }}
    {{- . | nindent 4 }}
    {{- end }}
  {{- with (include "agentic-platform.httpRouteAnnotations" (dict "ctx" . "route" "muster")) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.ingress.parentRefs | nindent 4 }}
  {{- with .Values.ingress.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "agentic-platform.musterFullname" . }}
          port: {{ include "agentic-platform.musterServicePort" . }}
