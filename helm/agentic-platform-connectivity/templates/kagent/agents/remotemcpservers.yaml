{{- if .Values.kagent.enabled }}
{{- $ns := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $musterUrl := printf "http://%s.%s.svc.cluster.local:%v/mcp" (include "agentic-platform.musterFullname" .) .Release.Namespace (include "agentic-platform.musterServicePort" .) }}
{{- if .Values.muster.enabled }}
{{/* Shared platform gateway: created in the release namespace (not $ns) and
referenced cross-namespace by tenant agents — the generic `agent` chart defaults
its serverRef to muster/agentic-platform; that name/namespace pair is the
platform contract, so it is fixed here. Rendered whenever kagent + muster are
enabled: the CR is inert until an agent references it. allowedNamespaces
from: All admits every namespace; muster still authenticates each call.
On-behalf-of only: no headersFrom, so the caller token forwarded by kagent
(KAGENT_PROPAGATE_TOKEN) is the only Authorization reaching muster — unlike the
per-agent "muster-<name>" servers below, which inject a static SA token (M2M). */}}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: muster
  namespace: {{ .Release.Namespace }}
spec:
  description: "Shared muster MCP gateway for platform agents"
  url: {{ $musterUrl | quote }}
  protocol: STREAMABLE_HTTP
  allowedNamespaces:
    from: All
{{/* One muster RemoteMCPServer per enabled agent: same muster Service. M2M agents
carry their own SA token via headersFrom so muster sees a per-agent identity; OBO
agents (obo.enabled) omit it and forward the propagated human muster token instead. */}}
{{- range $name, $cfg := .Values.agents.definitions }}
{{- $agent := merge (dict "name" $name) $cfg }}
{{- if $agent.enabled }}
{{- $tokenSecretName := include "agentic-platform.musterTokenSecretName" (dict "root" $ "agent" $agent) }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: {{ include "agentic-platform.musterServerName" $agent | quote }}
  namespace: {{ $ns }}
spec:
  description: {{ printf "muster MCP gateway (%s)" $agent.name | quote }}
  url: {{ $musterUrl | quote }}
  protocol: STREAMABLE_HTTP
{{- if not $agent.obo.enabled }}
  {{/* M2M agent: inject the static SA Bearer token so muster sees the per-agent
  identity. OBO agents omit this entirely so kagent's propagated human muster
  token (KAGENT_PROPAGATE_TOKEN) is the only Authorization reaching muster — the
  static header would otherwise win (kagent applies static headers last) and
  shadow the user. No X-Actor-Token act-chain: the forwarded token is already a
  muster access_token, so the human is the muster subject directly. */}}
  headersFrom:
  - name: Authorization
    valueFrom:
      type: Secret
      name: {{ $tokenSecretName | quote }}
      key: token
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- range .Values.agents.remoteMcpServers }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: {{ required "agents.remoteMcpServers[].name is required" .name | quote }}
  namespace: {{ $ns }}
spec:
  description: {{ .description | default (printf "%s MCP server" .name) | quote }}
  url: {{ required "agents.remoteMcpServers[].url is required" .url | quote }}
  protocol: STREAMABLE_HTTP
  {{- with .tokenSecret }}
  headersFrom:
  - name: Authorization
    valueFrom:
      type: Secret
      name: {{ . | quote }}
      key: token
  {{- end }}
{{- end }}
{{- end }}
