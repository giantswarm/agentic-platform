{{- if .Values.kagent.enabled }}
{{- $ns := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $musterUrl := printf "http://%s.%s.svc.cluster.local:%v/mcp" (include "agentic-platform.musterFullname" .) .Release.Namespace (include "agentic-platform.musterServicePort" .) }}
{{- if .Values.muster.enabled }}
{{/* One muster RemoteMCPServer per enabled agent: same muster Service. By default
each carries the agent's own service-account token via headersFrom. An agent that
forwards the inbound Authorization ("authorization" in allowedHeaders) omits
headersFrom so the caller's own token reaches muster unshadowed. */}}
{{- range $name, $cfg := .Values.agents.definitions }}
{{- $agent := merge (dict "name" $name) $cfg }}
{{- if $agent.enabled }}
{{- $forwardAuth := include "agentic-platform.agentForwardsAuthorization" $agent }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: {{ include "agentic-platform.musterServerName" $agent | quote }}
  namespace: {{ $ns }}
spec:
  description: {{ printf "muster MCP gateway (%s)" $agent.name | quote }}
  url: {{ $musterUrl | quote }}
  protocol: STREAMABLE_HTTP
  {{- if not $forwardAuth }}
  {{- $tokenSecretName := include "agentic-platform.musterTokenSecretName" (dict "root" $ "agent" $agent) }}
  headersFrom:
  - name: Authorization
    valueFrom:
      type: Secret
      name: {{ $tokenSecretName | quote }}
      key: token
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- range .Values.agents.remoteMcpServers }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: {{ required "agents.remoteMcpServers[].name is required" .name | quote }}
  namespace: {{ $ns }}
spec:
  description: {{ .description | default (printf "%s MCP server" .name) | quote }}
  url: {{ required "agents.remoteMcpServers[].url is required" .url | quote }}
  protocol: STREAMABLE_HTTP
  {{- with .tokenSecret }}
  headersFrom:
  - name: Authorization
    valueFrom:
      type: Secret
      name: {{ . | quote }}
      key: token
  {{- end }}
{{- end }}
{{- end }}
