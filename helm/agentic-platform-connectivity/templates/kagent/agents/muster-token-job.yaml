{{- if and .Values.kagent.enabled .Values.muster.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $tokenSecretName := printf "%s-kagent-muster-token" (include "name" .) }}
{{- $resourceId := .Values.muster.muster.oauth.server.resourceIdentifier }}
{{- $hostname := first .Values.ingress.hostnames }}
{{- if and (not $resourceId) (not $hostname) }}
  {{- fail "set muster.muster.oauth.server.resourceIdentifier or ingress.hostnames[0] — required to compute the muster token audience" }}
{{- end }}
{{- $musterAudience := $resourceId | default (printf "https://%s/mcp" $hostname) }}
{{/*
Why this Job exists:
  kagent's RemoteMCPServer uses headersFrom to inject an Authorization header on
  every MCP request. headersFrom reads a plain Secret verbatim (value or valueFrom,
  no templating), so the Secret must hold the literal string "Bearer <token>".

  The token must pass muster's trustedIssuers JWT validation, which requires the
  cluster OIDC issuer in iss and an exp claim. Legacy
  kubernetes.io/service-account-token Secrets carry iss "kubernetes/serviceaccount"
  and no exp, so only TokenRequest-minted tokens pass. A projected serviceAccountToken
  volume mints such a token for the Job's own ServiceAccount (kagent-muster-client,
  the identity muster trusts), scoped to the muster audience. The init container reads
  that token, prepends "Bearer ", and renders a Secret manifest; the kubectl container
  applies it. The kubectl image is distroless (no shell), so the string handling and
  the pipe-free manifest build happen in the busybox init container and kubectl is
  invoked with args only. Runs as a post-install/post-upgrade hook, so the snapshot is
  refreshed on every Helm lifecycle event.

  All Agent, ModelConfig, and RemoteMCPServer CRs must be in the same namespace
  (kagent.namespaceOverride, defaulting to the release namespace) because the kagent
  controller watches a single namespace scope for these resources.
*/}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "name" . }}-kagent-muster-token-init
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-muster-token-init
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      serviceAccountName: kagent-muster-client
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: muster-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: {{ $musterAudience | quote }}
                  expirationSeconds: {{ .Values.agents.muster.tokenExpirationSeconds | int64 }}
                  path: token
        - name: work
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      initContainers:
        - name: render
          image: {{ printf "%s/%s:%s" .Values.agents.muster.busyboxImage.registry .Values.agents.muster.busyboxImage.repository .Values.agents.muster.busyboxImage.tag | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          command:
            - /bin/sh
            - -ec
            - |
              header="$(printf 'Bearer %s' "$(cat /var/run/muster-token/token)" | base64 | tr -d '\n')"
              cat > /work/secret.yaml <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{ $tokenSecretName }}
                namespace: {{ $kagentNs }}
              type: Opaque
              data:
                token: ${header}
              EOF
          volumeMounts:
            - name: muster-token
              mountPath: /var/run/muster-token
              readOnly: true
            - name: work
              mountPath: /work
      containers:
        - name: apply
          image: {{ printf "%s/%s:%s" .Values.agents.muster.kubectlImage.registry .Values.agents.muster.kubectlImage.repository .Values.agents.muster.kubectlImage.tag | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          args:
            - apply
            - -f
            - /work/secret.yaml
            - --cache-dir=/tmp/.kube/cache
          volumeMounts:
            - name: work
              mountPath: /work
              readOnly: true
            - name: tmp
              mountPath: /tmp
{{- end }}
