{{- if and .Values.kagent.enabled .Values.muster.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{/*
Why this Job exists:
  kagent's RemoteMCPServer uses headersFrom to inject an Authorization header on
  every MCP request. headersFrom reads a plain Secret verbatim (value or valueFrom,
  no templating), so the Secret must hold the literal string "Bearer <token>".

  The token must pass muster's trustedIssuers JWT validation, which requires the
  cluster OIDC issuer in iss and an exp claim. Legacy
  kubernetes.io/service-account-token Secrets carry iss "kubernetes/serviceaccount"
  and no exp, so only TokenRequest-minted tokens pass.

  One Job per enabled agent bootstraps that agent's token Secret on install/upgrade
  so the agent has a token immediately; the muster-token-refresh CronJob re-mints it
  on a schedule (the token TTL is short, so the snapshot must be rotated, not minted
  once). Both share the pod spec in _muster-token.tpl, which runs the Job as the
  agent's own ServiceAccount.

  All Agent, ModelConfig, and RemoteMCPServer CRs must be in the same namespace
  (kagent.namespaceOverride, defaulting to the release namespace) because the kagent
  controller watches a single namespace scope for these resources.
*/}}
{{- range $name, $cfg := .Values.agents.definitions }}
{{- $agent := merge (dict "name" $name) $cfg }}
{{/* Skip agents that forward the inbound Authorization to muster: they consume no
token Secret, so there is nothing to bootstrap. */}}
{{- if and $agent.enabled (not (include "agentic-platform.agentForwardsAuthorization" $agent)) }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-muster-token-init-%s" (include "name" $) $agent.name | trunc 63 | trimSuffix "-" }}
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-muster-token-init
        app.kubernetes.io/managed-by: {{ $.Release.Service }}
    spec:
      {{- include "agentic-platform.musterTokenPodSpec" (dict "root" $ "agent" $agent) | nindent 6 }}
{{- end }}
{{- end }}
{{- end }}
