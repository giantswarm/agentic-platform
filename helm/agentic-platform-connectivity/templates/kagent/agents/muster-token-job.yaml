{{- if and .Values.kagent.enabled .Values.muster.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{/*
Why this Job exists:
  kagent's RemoteMCPServer uses headersFrom to inject an Authorization header on
  every MCP request. headersFrom reads a plain Secret verbatim (value or valueFrom,
  no templating), so the Secret must hold the literal string "Bearer <token>".

  The token must pass muster's trustedIssuers JWT validation, which requires the
  cluster OIDC issuer in iss and an exp claim. Legacy
  kubernetes.io/service-account-token Secrets carry iss "kubernetes/serviceaccount"
  and no exp, so only TokenRequest-minted tokens pass.

  This Job bootstraps the Secret on install/upgrade so the agent has a token
  immediately; the muster-token-refresh CronJob re-mints it on a schedule (the
  token TTL is short, so the snapshot must be rotated, not minted once). Both
  share the pod spec defined in _muster-token.tpl.

  All Agent, ModelConfig, and RemoteMCPServer CRs must be in the same namespace
  (kagent.namespaceOverride, defaulting to the release namespace) because the kagent
  controller watches a single namespace scope for these resources.
*/}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "name" . }}-kagent-muster-token-init
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-muster-token-init
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      {{- include "agentic-platform.musterTokenPodSpec" . | nindent 6 }}
{{- end }}
