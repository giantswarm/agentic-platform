{{- if and .Values.kagent.enabled .Values.muster.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{/*
Per enabled agent: a Role + RoleBinding letting the agent's own ServiceAccount write
only that agent's token Secret. The ServiceAccount itself is the agent's SA, created
by the kagent controller from the Agent CR, so it is not templated here.
*/}}
{{- range $name, $cfg := .Values.agents.definitions }}
{{- $agent := merge (dict "name" $name) $cfg }}
{{- if $agent.enabled }}
{{- $tokenSecretName := include "agentic-platform.musterTokenSecretName" (dict "root" $ "agent" $agent) }}
{{- $identitySA := include "agentic-platform.agentServiceAccount" $agent }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-muster-token-init-%s" (include "name" $) $agent.name | trunc 63 | trimSuffix "-" }}
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ $tokenSecretName | quote }}]
    verbs: ["get", "patch"]
  # create cannot be restricted by resourceNames: the object name is not part
  # of the authorization attributes of a create request.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-muster-token-init-%s" (include "name" $) $agent.name | trunc 63 | trimSuffix "-" }}
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-muster-token-init-%s" (include "name" $) $agent.name | trunc 63 | trimSuffix "-" }}
subjects:
  - kind: ServiceAccount
    name: {{ $identitySA }}
    namespace: {{ $kagentNs }}
{{- end }}
{{- end }}
{{- end }}
