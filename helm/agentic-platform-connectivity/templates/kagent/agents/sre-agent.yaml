{{- if and .Values.kagent.enabled .Values.agents.sreAgent.enabled }}
{{- $ns := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $sre := .Values.agents.sreAgent }}
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: sre-agent
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  type: Declarative
  declarative:
    description: {{ $sre.description | quote }}
    modelConfig: {{ $sre.modelConfig | quote }}
    systemMessage: |-
      {{- $sre.systemMessage | nindent 6 }}
    tools:
    - type: McpServer
      mcpServer:
        name: {{ $sre.toolServer | quote }}
        kind: RemoteMCPServer
        apiGroup: kagent.dev
        {{- with $sre.toolNames }}
        toolNames:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $sre.allowedHeaders }}
        allowedHeaders:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    {{- if or $sre.resources $sre.env }}
    deployment:
      {{- with $sre.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $sre.env }}
      env:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
