{{- if and .Values.kagent.enabled .Values.muster.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{/*
Re-mints each enabled agent's token Secret on a schedule. The projected token is
short-lived (agents.muster.tokenExpirationSeconds), so the bootstrap Job's snapshot
would expire between Helm upgrades; this CronJob keeps it fresh. The schedule must be
well inside the token TTL so a missed run still leaves a valid token. kagent's
RemoteMCPServer controller watches the Secret and re-resolves the header on change, so
the rotation takes effect without restarting the agent. One CronJob per agent.

The name truncates the release-name prefix rather than the trailing agent name: a
CronJob name must be <= 52 chars (it appends a timestamp for spawned Jobs), and the
agent name is the part that must stay unique across entries.
*/}}
{{- range $name, $cfg := .Values.agents.definitions }}
{{- $agent := merge (dict "name" $name) $cfg }}
{{- if $agent.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-muster-refresh-%s" (include "name" $ | trunc 20 | trimSuffix "-") $agent.name | trunc 52 | trimSuffix "-" }}
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" $ | nindent 4 }}
spec:
  schedule: {{ $.Values.agents.muster.tokenRefreshSchedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: muster-token-refresh
            app.kubernetes.io/managed-by: {{ $.Release.Service }}
        spec:
          {{- include "agentic-platform.musterTokenPodSpec" (dict "root" $ "agent" $agent) | nindent 10 }}
{{- end }}
{{- end }}
{{- end }}
