{{- if .Values.kagent.enabled }}
{{- $ns := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- range $name, $cfg := .Values.agents.definitions }}
{{- $agent := merge (dict "name" $name) $cfg }}
{{- if $agent.enabled }}
{{- $identitySA := include "agentic-platform.agentServiceAccount" $agent }}
---
# Chart-owned so it exists before the muster-token bootstrap Job (a post-install
# hook running as this SA) and before the kagent controller needs it. The Agent's
# serviceAccountName below pins it, so kagent uses this SA instead of creating its
# own — without it the SA would only appear once the agent Deployment is up, which
# needs the muster RemoteMCPServer accepted, which needs the token this SA mints.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $identitySA | quote }}
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" $ | nindent 4 }}
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: {{ $agent.name | quote }}
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" $ | nindent 4 }}
spec:
  type: Declarative
  declarative:
    description: {{ $agent.description | quote }}
    modelConfig: {{ $agent.modelConfig | quote }}
    systemMessage: |-
      {{- $agent.systemMessage | nindent 6 }}
    tools:
    - type: McpServer
      mcpServer:
        name: {{ include "agentic-platform.musterServerName" $agent | quote }}
        kind: RemoteMCPServer
        apiGroup: kagent.dev
        {{- with $agent.toolNames }}
        toolNames:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $agent.allowedHeaders }}
        allowedHeaders:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    deployment:
      serviceAccountName: {{ $identitySA | quote }}
      {{- with $agent.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $agent.env }}
      env:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
