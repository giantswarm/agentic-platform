{{- if .Values.kagent.enabled }}
{{- $ns := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- range $name, $cfg := .Values.agents.definitions }}
{{- $agent := merge (dict "name" $name) $cfg }}
{{- if $agent.enabled }}
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: {{ $agent.name | quote }}
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" $ | nindent 4 }}
spec:
  type: Declarative
  declarative:
    description: {{ $agent.description | quote }}
    modelConfig: {{ $agent.modelConfig | quote }}
    systemMessage: |-
      {{- $agent.systemMessage | nindent 6 }}
    tools:
    - type: McpServer
      mcpServer:
        name: {{ include "agentic-platform.musterServerName" $agent | quote }}
        kind: RemoteMCPServer
        apiGroup: kagent.dev
        {{- with $agent.toolNames }}
        toolNames:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $agent.allowedHeaders }}
        allowedHeaders:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    {{- if or $agent.resources $agent.env }}
    deployment:
      {{- with $agent.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $agent.env }}
      env:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
