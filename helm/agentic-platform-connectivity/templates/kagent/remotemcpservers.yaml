{{- if .Values.kagent.enabled }}
{{- $ns := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $musterUrl := printf "http://%s.%s.svc.cluster.local:%v/mcp" (include "agentic-platform.musterFullname" .) .Release.Namespace (include "agentic-platform.musterServicePort" .) }}
{{- if .Values.muster.enabled }}
{{/* Shared platform gateway: created in the release namespace (not $ns) and
referenced cross-namespace by tenant agents — the generic `agent` chart defaults
its serverRef to muster/agentic-platform; that name/namespace pair is the
platform contract, so it is fixed here. Rendered whenever kagent + muster are
enabled: the CR is inert until an agent references it. allowedNamespaces
from: All admits every namespace; muster still authenticates each call.
No headersFrom, so the caller token forwarded by kagent (KAGENT_PROPAGATE_TOKEN)
is the only Authorization reaching muster. */}}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: muster
  namespace: {{ .Release.Namespace }}
spec:
  description: "Shared muster MCP gateway for platform agents"
  url: {{ $musterUrl | quote }}
  protocol: STREAMABLE_HTTP
  allowedNamespaces:
    from: All
{{- end }}
{{- range .Values.kagent.remoteMcpServers }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: {{ required "kagent.remoteMcpServers[].name is required" .name | quote }}
  namespace: {{ $ns }}
spec:
  description: {{ .description | default (printf "%s MCP server" .name) | quote }}
  url: {{ required "kagent.remoteMcpServers[].url is required" .url | quote }}
  protocol: STREAMABLE_HTTP
  {{- with .tokenSecret }}
  headersFrom:
  - name: Authorization
    valueFrom:
      type: Secret
      name: {{ . | quote }}
      key: token
  {{- end }}
{{- end }}
{{- end }}
