{{- if and .Values.networkPolicy.enabled (eq .Values.networkPolicy.flavor "cilium") .Values.networkPolicy.musterInClusterMcpPorts }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "agentic-platform.musterFullname" . }}-mcp-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  # Muster's own CNP (muster sub-chart) permits cluster-entity egress only on
  # 80/443, which misses in-cluster MCP backends listening on another port
  # (e.g. the bundled pro / runbooks MCP servers on 8080) reached via a
  # ClusterIP. Cilium policies are additive, so this supplements muster's
  # policy — widening its egress without forking the sub-chart.
  # muster runs as its own release (separate from this connectivity release), so
  # select it by name only rather than a release-scoped instance label.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: muster
  egress:
    - toEntities:
        - cluster
      toPorts:
        - ports:
          {{- range .Values.networkPolicy.musterInClusterMcpPorts }}
            - port: {{ . | quote }}
              protocol: TCP
          {{- end }}
{{- end }}
