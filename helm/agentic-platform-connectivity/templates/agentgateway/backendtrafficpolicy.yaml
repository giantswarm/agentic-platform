{{- if and (include "agentic-platform.ingress.agentgateway" .) .Values.ingress.backendTrafficPolicy.enabled }}
{{- $fullName := .Values.gateway.name }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
    {{- with .Values.ingress.backendTrafficPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.ingress.backendTrafficPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $fullName }}
      namespace: {{ .Release.Namespace }}
  timeout:
    http:
      requestTimeout: {{ .Values.ingress.backendTrafficPolicy.timeout | quote }}
{{- end }}
