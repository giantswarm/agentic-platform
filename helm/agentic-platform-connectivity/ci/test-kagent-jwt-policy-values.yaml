# kagent controllerRoute with the JWT policy enabled: renders the
# AgentgatewayPolicy + dex-jwks AgentgatewayBackend alongside the routes.
kagent:
  enabled: true
  namespaceOverride: kagent
  controllerRoute:
    enabled: true
    hostname: agentgateway.ci.example.com
    pathPrefix: /kagent
    jwtAuthentication:
      enabled: true
      issuer: https://dex.ci.example.com

ingress:
  mode: agentgateway-muster
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

gateway:
  jwksEgress:
    enabled: true

agentgateway:
  enabled: true

muster:
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false
