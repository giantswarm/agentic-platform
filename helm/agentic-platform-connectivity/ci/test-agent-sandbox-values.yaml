# Exercises the opt-in agent-sandbox controller: the `agentSandbox.enabled`
# dependency gate plus the umbrella Kyverno mutate policy that injects
# restricted-PSS into the controller Deployment. The umbrella must still ship
# zero CRDs (the agent-sandbox subchart has crds/ stripped).
#
# Mode is muster-direct (no agentgateway), OAuth/valkey off — the simplest stack.
ingress:
  mode: muster-direct
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

muster:
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false

agentSandbox:
  enabled: true
