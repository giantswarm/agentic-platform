# =============================================================================
# Customer / BWI preset — a BILL OF MATERIALS.
#
# Every range pinned to an exact, dogfood-tested version. Upgrades are a
# deliberate edit to this file; nothing auto-updates. This file IS the "product
# release" — generated by snapshotting the resolved versions from a known-good
# internal dev state, not by inventing a separate release object.
#
# Used as: helm install ... -f ci/customer-bom-values.yaml  (overlays values.yaml)
# =============================================================================

gitops:
  engine: flux
  interval: 30m

components:
  agentic-platform-crds:
    versionRange: "0.2.0"
  muster:
    versionRange: "0.4.1"
  agentgateway:
    versionRange: "v1.2.1"
  valkey:
    versionRange: "0.1.2"
  kagent:
    enabled: true
    versionRange: "0.9.6"
  agentic-platform-mcps:
    versionRange: "0.3.0"
