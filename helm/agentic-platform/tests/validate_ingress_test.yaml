suite: validateIngress guards

templates:
  - validate.yaml

tests:
  - it: rejects agentgateway-direct (not yet supported)
    set:
      ingress.mode: agentgateway-direct
      ingress.parentRefs[0].name: gw
    asserts:
      - failedTemplate:
          errorMessage: "ingress.mode=agentgateway-direct requires a DCR-capable IdP (RFC 7591/8707), e.g. Zitadel; not yet supported"

  - it: rejects empty parentRefs in muster-direct mode
    set:
      ingress.mode: muster-direct
    asserts:
      - failedTemplate:
          errorMessage: "ingress.parentRefs is required in all modes — the umbrella-owned muster `/` route (and the agentgateway `/mcp` route in agentgateway-* modes) attaches to it; an empty parentRefs renders a route bound to no Gateway, leaving muster unreachable while install reports success"

  - it: rejects empty parentRefs in agentgateway-muster mode
    set:
      ingress.mode: agentgateway-muster
      agentgateway.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ingress.parentRefs is required in all modes — the umbrella-owned muster `/` route (and the agentgateway `/mcp` route in agentgateway-* modes) attaches to it; an empty parentRefs renders a route bound to no Gateway, leaving muster unreachable while install reports success"

  - it: rejects agentgateway-muster with viaMuster=false when mcps enabled
    set:
      ingress.mode: agentgateway-muster
      ingress.parentRefs[0].name: gw
      agentgateway.enabled: true
      mcps.enabled: true
      agentic-platform-mcps.agentgateway.viaMuster: false
    asserts:
      - failedTemplate:
          errorMessage: "ingress.mode=agentgateway-muster requires agentic-platform-mcps.agentgateway.viaMuster=true"

  - it: rejects agentgateway.enabled=false in agentgateway-muster mode
    set:
      ingress.mode: agentgateway-muster
      ingress.parentRefs[0].name: gw
      agentgateway.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "agentgateway.enabled must be true in agentgateway-* modes; the controller dependency condition must match ingress.mode"

  - it: rejects agentgateway.enabled=true in muster-direct mode
    set:
      ingress.mode: muster-direct
      ingress.parentRefs[0].name: gw
      agentgateway.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "agentgateway.enabled must be false in muster-direct mode; the controller dependency condition must match ingress.mode"

  - it: accepts a valid muster-direct config
    set:
      ingress.mode: muster-direct
      ingress.parentRefs[0].name: gw
      agentgateway.enabled: false
      muster.muster.oauth.server.enabled: false
      muster.muster.oauth.server.storage.type: memory
      valkey.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: accepts a valid agentgateway-muster config
    set:
      ingress.mode: agentgateway-muster
      ingress.parentRefs[0].name: gw
      agentgateway.enabled: true
      mcps.enabled: true
      agentic-platform-mcps.agentgateway.viaMuster: true
      muster.muster.oauth.server.enabled: false
      muster.muster.oauth.server.storage.type: memory
      valkey.enabled: false
    asserts:
      - hasDocuments:
          count: 0
