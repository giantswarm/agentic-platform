global:
  registry: gsoci.azurecr.io
  imagePullSecrets: []

gateway:
  enabled: true
  # Data-plane Gateway. Reconciled by the `agentgateway` controller; the
  # `agentgateway` GatewayClass is a cluster-level prerequisite. Two
  # release instances in the same cluster must override `gateway.name`
  # (Gateway is namespaced, so different release namespaces are fine).
  # muster's public HTTPRoute attaches to a separate, operator-owned
  # public Gateway — not to this one. See `muster.gatewayAPI.httpRoute`.
  name: agentgateway
  gatewayClassName: agentgateway
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
  # AgentgatewayParameters is referenced from Gateway.spec.infrastructure.parametersRef.
  # The agentic platform owns this resource because the upstream agentgateway chart does not
  # render it and the data-plane pod template is hardcoded inside the controller binary.
  parameters:
    enabled: true
    name: ""
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
    # Strategic-merge `env` for the data-plane container. Use this to push
    # OTel exporter config or any other env-driven knob onto the dynamically
    # rendered Deployment without forking the controller.
    # Example:
    #   dataPlaneEnv:
    #     - name: OTEL_EXPORTER_OTLP_ENDPOINT
    #       value: http://tempo-distributor.tempo.svc:4317
    dataPlaneEnv: []

# Bootstrap helpers for first-install on a fresh cluster. Opt-in.
bootstrap:
  # Bootstrap the muster OAuth Secret if it doesn't exist. Random values
  # are generated for `registration-token`, `oauth-encryption-key`, and
  # `valkey-password` on first install; subsequent installs re-emit the
  # existing values via Helm `lookup`. `helm.sh/resource-policy: keep`
  # protects the Secret from `helm uninstall`. Caveats are documented in
  # templates/oauth-bootstrap-secret.yaml — do not use rendered Helm
  # output as a GitOps source of truth for these fields.
  #
  # Set `muster.muster.oauth.server.existingSecret: muster-oauth` to
  # consume the bootstrapped Secret.
  oauth:
    enabled: false
    # Name of the Secret to create / re-emit.
    name: muster-oauth
    # MUST match the secret registered against the cluster's Dex /
    # OIDC issuer (the agentic platform does not register clients;
    # see README "Dex / OIDC client registration").
    dexClientSecret: ""

networkPolicy:
  enabled: true
  # Set to "none" on non-Cilium clusters.
  flavor: cilium
  # Extra CIDR-based egress rules for endpoints the `cluster` / `world`
  # entity selectors don't cover. The most common case: OIDC discovery
  # (Dex) resolves to an envoy-gateway LoadBalancer VIP whose Cilium
  # identity doesn't match either selector, so requests drop silently.
  # Example:
  #   additionalEgressCIDRs:
  #     - 10.223.16.0/24   # envoy-gateway VIP range on glean
  additionalEgressCIDRs: []
  # Extra FQDN-based egress rules. Requires the cluster to ship a Cilium
  # DNS visibility policy (CiliumClusterwideNetworkPolicy on most GS
  # workload clusters). Use for hosted MCPServers / public OIDC issuers.
  # Example:
  #   additionalEgressFQDNs:
  #     - matchName: dex.glean.azuretest.gigantic.io
  additionalEgressFQDNs: []

muster:
  image:
    registry: gsoci.azurecr.io
  ciliumNetworkPolicy:
    enabled: true
    # Required when Dex / OIDC providers / MCPServers are fronted by an
    # in-cluster Gateway (envoy-gateway-system, agentgateway, etc.). The
    # default in the muster sub-chart is `false`, which only allows world
    # egress and breaks production Giant Swarm installs that resolve OIDC
    # via in-cluster ingress LoadBalancer / ClusterIP IPs.
    allowClusterIngress: true
  podAnnotations:
    application.giantswarm.io/team: bumblebee
  gatewayAPI:
    enabled: true
    httpRoute:
      enabled: true
      # The umbrella does NOT default the HTTPRoute to its internal
      # `agentgateway` Gateway — that Gateway is for the data-plane and is
      # not exposed publicly. Operators must point the HTTPRoute at the
      # cluster's public Gateway (typically the envoy-gateway-system one)
      # and set `hostnames` so the OAuth callback URLs built against
      # `muster.oauth.mcpClient.publicUrl` resolve. The muster sub-chart's
      # fail-guard rejects install when `parentRefs` is empty and
      # `gatewayAPI.enabled` is true.
      # Example:
      #   muster:
      #     gatewayAPI:
      #       enabled: true
      #       httpRoute:
      #         parentRefs:
      #           - name: giantswarm-default
      #             namespace: envoy-gateway-system
      #             group: gateway.networking.k8s.io
      #             kind: Gateway
      #         hostnames:
      #           - muster.<cluster>.<base-domain>
      parentRefs: []
      hostnames: []
  # The muster sub-chart's `crds.install` is a deprecated no-op since
  # muster split CRDs into the sibling `muster-crds` chart. Pinning to
  # false here is a safety declaration — without it, an older `muster`
  # chart whose `templates/crds.yaml` still globbed `crds/*` would render
  # ownership-less CRDs on every umbrella install.
  crds:
    install: false

# Bundled Valkey for muster's OAuth session storage. Opt-in: set
# `valkey.enabled: true` together with `muster.muster.oauth.server.storage.type: valkey`
# and `muster.muster.oauth.server.storage.valkey.url: muster-valkey-primary.<release-namespace>.svc:6379`.
# Operators with an out-of-band Valkey (e.g. shared across namespaces) should
# leave `valkey.enabled: false` and configure the muster sub-chart's
# `oauth.server.storage.valkey` block directly.
valkey:
  enabled: false
  # Keep the primary Service at `muster-valkey-primary` so muster's default
  # URL convention matches without a cross-subchart values rewrite.
  fullnameOverride: muster-valkey
  # The bitnami chart defaults `image.tag: "latest"` which kube-linter
  # (and image-policy admission webhooks) reject. Pin to the chart's
  # appVersion explicitly. Sentinel/metrics/etc. are off by default and
  # not pinned here — enable them in operator values together with their
  # own tag pin.
  image:
    tag: "9.0.4"
  auth:
    enabled: true
    # `existingSecret` should reference a Secret with key `valkey-password`.
    # The same Secret is consumed by muster (set
    # `muster.muster.oauth.server.storage.valkey.existingSecret` to match).
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

agentgateway:
  image:
    registry: gsoci.azurecr.io
    tag: v1.2.1
  controller:
    image:
      repository: giantswarm/agentgateway-controller
  proxy:
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/agentgateway
      tag: v1.2.1
  podAnnotations:
    application.giantswarm.io/team: bumblebee
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
