global:
  registry: gsoci.azurecr.io
  imagePullSecrets: []

gateway:
  enabled: true
  name: agentgateway
  gatewayClassName: agentgateway
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
  # AgentgatewayParameters is referenced from Gateway.spec.infrastructure.parametersRef.
  # The umbrella owns this resource because upstream's agentgateway chart does not render it
  # and the data-plane pod template is hardcoded inside the controller binary.
  parameters:
    enabled: true
    name: ""
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault

networkPolicy:
  enabled: true
  # Set to "none" on non-Cilium clusters.
  flavor: cilium

muster:
  image:
    registry: gsoci.azurecr.io
  ciliumNetworkPolicy:
    enabled: true
  podAnnotations:
    application.giantswarm.io/team: bumblebee
  gatewayAPI:
    httpRoute:
      enabled: true
      # parentRefs[0].name MUST equal .gateway.name above — the HTTPRoute
      # attaches to the Gateway this umbrella renders.
      parentRefs:
        - name: agentgateway

agentgateway-crds:
  enabled: true

agentgateway:
  image:
    registry: gsoci.azurecr.io
    tag: v1.2.1
  controller:
    image:
      repository: giantswarm/agentgateway-controller
  proxy:
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/agentgateway
      tag: v1.2.1
  podAnnotations:
    application.giantswarm.io/team: bumblebee
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
