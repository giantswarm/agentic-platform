# =============================================================================
# Customer bill-of-materials (example overlay).
#
# Every component version pinned to an exact, dogfood-tested version. Overlays
# values.yaml: `helm install ... -f examples/customer-bom.yaml`. This file IS the
# "product release" — generated by snapshotting the versions resolved from a
# known-good internal dev state. Upgrades are a deliberate edit here; nothing
# auto-updates. (Not under ci/ on purpose, so chart-testing does not treat it as
# an install test case.)
# =============================================================================

gitops:
  engine: flux
  interval: 30m

components:
  muster:                        { versionRange: "0.9.0" }
  agentgateway:                  { versionRange: "v1.3.0" }
  valkey:                        { versionRange: "0.1.2" }
  agentic-platform-mcps:         { versionRange: "0.4.3" }
  kagent:                        { versionRange: "0.9.9" }
  klaus-gateway:                 { versionRange: "0.2.4" }
  agent-sandbox:                 { versionRange: "0.1.2" }
  dicebear:                      { versionRange: "0.3.0" }
  agentic-platform-connectivity: { versionRange: "1.5.0" }
