# Exercises the bundled agentic-platform-mcps sub-chart: the `mcps.enabled`
# dependency gate plus a sample muster MCPServer rendered from the abstract
# `mcpServers` list. The umbrella must still ship zero CRDs.
#
# Mode is muster-direct, so viaMuster stays at its default (false) — setting it
# true here would trip the ingress.mode consistency guard.
ingress:
  mode: muster-direct
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

muster:
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false

mcps:
  enabled: true

agentic-platform-mcps:
  mcpServers:
    - cluster: ci
      group: kubernetes
      url: https://mcp.ci.example.com/mcp
