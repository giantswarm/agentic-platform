# Exercises the bundled agentic-platform-mcps sub-chart: the `mcps.enabled`
# dependency gate plus a sample muster MCPServer rendered from the abstract
# `mcpServers` list. The umbrella must still ship zero CRDs.
muster:
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory
  gatewayAPI:
    httpRoute:
      parentRefs:
        - name: giantswarm-default
          namespace: envoy-gateway-system
          group: gateway.networking.k8s.io
          kind: Gateway
      hostnames:
        - muster.ci.example.com

valkey:
  enabled: false

mcps:
  enabled: true

agentic-platform-mcps:
  mcpServers:
    - cluster: ci
      group: kubernetes
      url: https://mcp.ci.example.com/mcp
