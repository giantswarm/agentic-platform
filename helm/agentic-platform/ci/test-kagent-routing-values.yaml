kagent:
  enabled: true
  namespaceOverride: kagent
  # Override the default startup probe (failureThreshold: 3, periodSeconds: 1 = 4s
  # window) with a generous failureThreshold so resource contention in the kind
  # single-node CI cluster does not kill the container before nginx starts.
  ui:
    startupProbe:
      httpGet:
        path: /health
        port: http
      periodSeconds: 5
      initialDelaySeconds: 1
      failureThreshold: 30
  controllerRoute:
    enabled: true
    hostname: agentgateway.ci.example.com
    pathPrefix: /kagent
  uiRoute:
    enabled: true
    hostname: kagent.ci.example.com
    parentRef:
      name: giantswarm-default
      namespace: envoy-gateway-system
  oauth2-proxy:
    enabled: true
    config:
      clientID: oauth2-proxy
      clientSecret: oauth2-proxy-secret
      cookieSecret: Y2hhbmdlbWVjaGFuZ2VtZWNoYW5nZW1lY2hhbmdlbQ==
    # Disable the /ready probe in CI: v7.6.0 uses /ready which blocks until
    # OIDC initialization completes. Dex startup timing makes this unreliable
    # as a Helm --wait gate; the container starting is sufficient for install.
    readinessProbe:
      enabled: false
    extraEnv:
      - name: OIDC_ISSUER_URL
        # In-cluster Dex installed as a CI prereq (ci/dex-values.yaml).
        value: http://dex.dex.svc.cluster.local:5556
      - name: OIDC_REDIRECT_URL
        value: https://kagent.ci.example.com/oauth2/callback
      - name: UPSTREAM_URL
        value: http://agentic-platform-ui:8080
  database:
    postgres:
      bundled:
        enabled: true

ingress:
  mode: agentgateway-muster
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

agentgateway:
  enabled: true

networkPolicy:
  flavor: kubernetes

muster:
  ciliumNetworkPolicy:
    enabled: false
  networkPolicy:
    flavor: kubernetes
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false
