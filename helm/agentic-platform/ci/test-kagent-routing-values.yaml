kagent:
  enabled: true
  namespaceOverride: kagent
  controllerRoute:
    enabled: true
    hostname: agentgateway.ci.example.com
    pathPrefix: /kagent
  uiRoute:
    enabled: true
    hostname: kagent.ci.example.com
    parentRef:
      name: giantswarm-default
      namespace: envoy-gateway-system
  oauth2-proxy:
    enabled: true
    config:
      existingSecret: kagent-oauth2-proxy
    extraEnv:
      - name: OIDC_ISSUER_URL
        value: https://dex.ci.example.com
      - name: OIDC_REDIRECT_URL
        value: https://kagent.ci.example.com/oauth2/callback
      - name: UPSTREAM_URL
        value: http://agentic-platform-ui:8080
  database:
    postgres:
      bundled:
        enabled: true

muster:
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory
  gatewayAPI:
    httpRoute:
      parentRefs:
        - name: giantswarm-default
          namespace: envoy-gateway-system
          group: gateway.networking.k8s.io
          kind: Gateway
      hostnames:
        - muster.ci.example.com

valkey:
  enabled: false
