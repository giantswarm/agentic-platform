kagent:
  enabled: true
  namespaceOverride: kagent
  # Override the default startup probe (failureThreshold: 3, periodSeconds: 1 = 4s
  # window) with a generous failureThreshold so resource contention in the kind
  # single-node CI cluster does not kill the container before nginx starts.
  ui:
    startupProbe:
      httpGet:
        path: /health
        port: http
      periodSeconds: 5
      initialDelaySeconds: 1
      failureThreshold: 30
  controllerRoute:
    enabled: true
    hostname: agentgateway.ci.example.com
    pathPrefix: /kagent
  uiRoute:
    enabled: true
    hostname: kagent.ci.example.com
    parentRef:
      name: giantswarm-default
      namespace: envoy-gateway-system
  oauth2-proxy:
    enabled: true
    config:
      clientID: oauth2-proxy
      clientSecret: oauth2-proxy-secret
      # 32 raw bytes — the chart stores this via b64enc in the K8s Secret and the
      # pod receives it back as the original string. oauth2-proxy needs exactly
      # 16, 24, or 32 bytes for AES; a base64-encoded value that decodes to a
      # non-power-of-16 length fails at startup.
      cookieSecret: changemechangemechangemechangeme
    # The kagent chart wires OIDC config via extraArgs that reference these env
    # vars using $(VAR_NAME) K8s substitution. Overriding extraEnv here fills
    # the OIDC_ISSUER_URL and OIDC_REDIRECT_URL slots that the chart leaves empty
    # by default; UPSTREAM_URL is included to preserve the full list (Helm
    # replaces lists, not merges them).
    extraEnv:
      - name: OIDC_ISSUER_URL
        value: http://dex.dex.svc.cluster.local:5556
      - name: OIDC_REDIRECT_URL
        value: https://kagent.ci.example.com/oauth2/callback
      - name: UPSTREAM_URL
        value: http://kagent-ui:8080
    readinessProbe:
      enabled: false
  database:
    postgres:
      bundled:
        enabled: true

ingress:
  mode: agentgateway-muster
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

agentgateway:
  enabled: true

networkPolicy:
  flavor: kubernetes

muster:
  ciliumNetworkPolicy:
    enabled: false
  networkPolicy:
    flavor: kubernetes
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false
