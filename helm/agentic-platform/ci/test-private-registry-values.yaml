global:
  registry: localhost:5000

# parentRefs is required in all modes (the muster `/` route attaches to it).
ingress:
  mode: muster-direct
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

muster:
  image:
    registry: localhost:5000

agentgateway:
  image:
    registry: localhost:5000
  proxy:
    image:
      registry: localhost:5000
