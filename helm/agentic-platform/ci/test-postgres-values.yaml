kagent:
  enabled: true
  namespaceOverride: kagent
  # CNPG DSN wiring — connects kagent to the platform Postgres instead of its
  # bundled postgres:18.3-alpine. The CNPG Cluster generates Secret
  # `agentic-platform-pg-app` in the kagent namespace; its `uri` key holds the
  # full connection string including the generated password.
  database:
    postgres:
      urlFile: /etc/cnpg/uri
      vectorEnabled: true
      bundled:
        enabled: false
  controller:
    volumes:
      - name: cnpg-dsn
        secret:
          secretName: agentic-platform-pg-app
          items:
            - key: uri
              path: uri
    volumeMounts:
      - name: cnpg-dsn
        mountPath: /etc/cnpg
        readOnly: true

postgres:
  enabled: true
  namespace: kagent
  instances: 1
  storage:
    size: 5Gi
    storageClass: standard
  vector:
    enabled: true
    # ImageVolume approach (CNPG 1.29+/PG18). Remove extensionImage.reference and
    # set postgres.image.name to a pgvector-bundled image for older CNPG versions.
    extensionImage:
      reference: ghcr.io/cloudnative-pg/pgvector:0.8.0-17-bookworm
  applicationDatabase:
    name: kagent
    owner: kagent
    schema: kagent

# muster-direct: this case exercises the kagent + postgres path, not routing
# (kagent.controllerRoute/uiRoute stay disabled). parentRefs is still required
# in every mode for the umbrella-owned muster `/` route.
ingress:
  mode: muster-direct
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

muster:
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false
