# kagent controller with its bundled postgres, no oauth2-proxy, no routing.
# Covers the CRD surface (Agent / ModelConfig / etc.) and the kagent controller
# startup path in kind without requiring an OIDC endpoint or CNPG operator.
kagent:
  enabled: true
  namespaceOverride: kagent
  database:
    postgres:
      bundled:
        enabled: true

ingress:
  mode: muster-direct
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

networkPolicy:
  flavor: kubernetes

muster:
  ciliumNetworkPolicy:
    enabled: false
  networkPolicy:
    flavor: kubernetes
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false
