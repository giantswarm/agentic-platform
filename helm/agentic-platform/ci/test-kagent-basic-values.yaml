# kagent controller with its bundled postgres, no oauth2-proxy, no routing.
# Covers the CRD surface (Agent / ModelConfig / etc.) and the kagent controller
# startup path in kind without requiring an OIDC endpoint or CNPG operator.
# See ci/lint-only/test-kagent-routing-values.yaml for the full oauth2-proxy +
# route exposure scenario (requires existingSecret and a live OIDC endpoint).
kagent:
  enabled: true
  namespaceOverride: kagent
  database:
    postgres:
      bundled:
        enabled: true

ingress:
  mode: muster-direct
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

muster:
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false
