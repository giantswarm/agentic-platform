# parentRefs is required in all modes (the muster `/` route attaches to it),
# so set it even though this case only exercises extraObjects.
ingress:
  mode: muster-direct
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

networkPolicy:
  flavor: kubernetes

muster:
  ciliumNetworkPolicy:
    enabled: false
  networkPolicy:
    flavor: kubernetes
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false

extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: agentic-platform-extra-cm
    data:
      example-key: example-value
      release: "{{ .Release.Name }}"
