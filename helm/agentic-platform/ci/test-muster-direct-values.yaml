global:
  registry: gsoci.azurecr.io

ingress:
  mode: muster-direct
  parentRefs:
    - name: giantswarm-default
      namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - muster.ci.example.com

networkPolicy:
  flavor: kubernetes

muster:
  ciliumNetworkPolicy:
    enabled: false
  networkPolicy:
    flavor: kubernetes
  muster:
    oauth:
      server:
        enabled: false
        storage:
          type: memory

valkey:
  enabled: false
