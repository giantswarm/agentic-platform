{{- if and .Values.kagent.enabled .Values.kagent.uiRoute.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $uiRoute := .Values.kagent.uiRoute }}
{{- $oauth2proxyEnabled := index .Values.kagent "oauth2-proxy" "enabled" | default false }}
# HTTPRoute for the kagent UI on the public Gateway.
# Placed in the kagent namespace so the backend Service (UI or oauth2-proxy)
# is in the same namespace — no ReferenceGrant needed.
#
# When oauth2-proxy is enabled: traffic flows public → oauth2-proxy → kagent UI.
# When oauth2-proxy is disabled: traffic goes directly to the UI (dev only —
# anyone with the hostname can access the UI without authentication).
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "name" . }}-ui
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $uiRoute.parentRef.name }}
      namespace: {{ $uiRoute.parentRef.namespace }}
      group: gateway.networking.k8s.io
      kind: Gateway
  {{- if $uiRoute.hostname }}
  hostnames:
    - {{ $uiRoute.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        {{- if $oauth2proxyEnabled }}
        - name: {{ printf "%s-oauth2-proxy" .Release.Name }}
          port: 4180
        {{- else }}
        - name: {{ printf "%s-ui" .Release.Name }}
          port: 8080
        {{- end }}
{{- end }}
