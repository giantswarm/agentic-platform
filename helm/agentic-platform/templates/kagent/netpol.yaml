{{- if and .Values.kagent.enabled .Values.networkPolicy.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $controllerPort := "8083" }}

{{- if eq .Values.networkPolicy.flavor "cilium" }}
# Allow the agentgateway data-plane (in the release namespace) to reach the
# kagent controller (in the kagent namespace) on the controller API port.
# Without this, Cilium blocks cross-namespace traffic and the HTTPRoute times out.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-dataplane-to-kagent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: controller
            app.kubernetes.io/name: {{ include "name" . }}
            k8s:io.kubernetes.pod.namespace: {{ $kagentNs }}
      toPorts:
        - ports:
            - port: {{ $controllerPort | quote }}
              protocol: TCP
---
# Allow ingress to the kagent controller from agentgateway pods (cross-namespace).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-kagent-from-agentgateway
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/name: {{ include "name" . }}
  ingress:
    - fromEndpoints:
        - matchLabels:
            gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      toPorts:
        - ports:
            - port: {{ $controllerPort | quote }}
              protocol: TCP
    # Allow intra-namespace traffic (UI → controller, agents → controller).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $kagentNs }}

{{- else if eq .Values.networkPolicy.flavor "kubernetes" }}
# Restrict kagent controller ingress: only the release namespace (agentgateway)
# and the kagent namespace (UI, agents) may reach port 8083.
# This prevents direct access bypassing agentgateway's JWT validation
# (the controller's trusted-proxy mode does not verify JWT signatures).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "name" . }}-kagent-controller-ingress
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/name: {{ include "name" . }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: {{ $controllerPort | int }}
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $kagentNs }}
      ports:
        - port: {{ $controllerPort | int }}
          protocol: TCP
{{- end }}

{{- end }}
