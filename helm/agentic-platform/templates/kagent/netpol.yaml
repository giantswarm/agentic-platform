{{- if and .Values.kagent.enabled .Values.networkPolicy.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $controllerPort := "8083" }}
{{- $clusterName := .Values.postgres.clusterName | default "agentic-platform-pg" }}

{{- if eq .Values.networkPolicy.flavor "cilium" }}
---
# Egress from agentgateway data-plane to the kagent controller (cross-namespace).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-dataplane-to-kagent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: controller
            app.kubernetes.io/name: kagent
            io.kubernetes.pod.namespace: {{ $kagentNs }}
      toPorts:
        - ports:
            - port: {{ $controllerPort | quote }}
              protocol: TCP
---
# Ingress to the kagent controller: agentgateway (cross-namespace) + intra-namespace.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-kagent-from-agentgateway
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/name: kagent
  ingress:
    - fromEndpoints:
        - matchLabels:
            gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
            io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      toPorts:
        - ports:
            - port: {{ $controllerPort | quote }}
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ $kagentNs }}
---
# Egress from the kagent controller: DNS, Postgres, Kubernetes API, OTLP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-kagent-controller-egress
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/name: kagent
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: coredns
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: k8s-dns-node-cache
      toPorts:
        - ports:
            - port: "1053"
              protocol: UDP
            - port: "1053"
              protocol: TCP
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - cluster
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toEntities:
        - kube-apiserver
    - toEntities:
        - cluster
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# CNPG cluster policies: inter-instance egress for streaming replication,
# and ingress from the kagent controller.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-pg-cluster
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: {{ $clusterName }}
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ $clusterName }}
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP
    - toEntities:
        - kube-apiserver
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: controller
            app.kubernetes.io/name: kagent
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

{{- if index .Values.kagent "oauth2-proxy" "enabled" }}
---
# Allow envoy-gateway to reach oauth2-proxy (public gateway → UI route).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-oauth2-proxy-ingress
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: envoy
            io.kubernetes.pod.namespace: envoy-gateway-system
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
---
# Allow oauth2-proxy: DNS, Dex OIDC (world:443), kagent UI backend.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-oauth2-proxy-egress
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: coredns
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: k8s-dns-node-cache
      toPorts:
        - ports:
            - port: "1053"
              protocol: UDP
            - port: "1053"
              protocol: TCP
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: kagent
            app.kubernetes.io/component: ui
            io.kubernetes.pod.namespace: {{ $kagentNs }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Allow oauth2-proxy to reach the kagent UI.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-kagent-ui-ingress
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kagent
      app.kubernetes.io/component: ui
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: oauth2-proxy
            io.kubernetes.pod.namespace: {{ $kagentNs }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
{{- end }}
{{- else if eq .Values.networkPolicy.flavor "kubernetes" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "name" . }}-kagent-controller-ingress
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/name: kagent
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: {{ $controllerPort | int }}
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $kagentNs }}
      ports:
        - port: {{ $controllerPort | int }}
          protocol: TCP
{{- end }}

{{- end }}
