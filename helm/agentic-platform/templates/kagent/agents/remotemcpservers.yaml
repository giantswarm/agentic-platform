{{- if and .Values.kagent.enabled .Values.agents.enabled .Values.agents.remoteMcpServers }}
{{- $ns := .Values.kagent.namespaceOverride | default "kagent" }}
{{- range .Values.agents.remoteMcpServers }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: {{ required "agents.remoteMcpServers[].name is required" .name | quote }}
  namespace: {{ $ns }}
spec:
  description: {{ .description | default (printf "%s MCP server" .name) | quote }}
  url: {{ required "agents.remoteMcpServers[].url is required" .url | quote }}
  protocol: STREAMABLE_HTTP
  headersFrom:
  - name: Authorization
    valueFrom:
      secretKeyRef:
        name: {{ required "agents.remoteMcpServers[].tokenSecret is required" .tokenSecret | quote }}
        key: token
{{- end }}
{{- end }}
