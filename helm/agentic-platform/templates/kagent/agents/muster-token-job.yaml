{{- if and .Values.kagent.enabled .Values.muster.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
{{- $tokenSecretName := printf "%s-kagent-muster-token" (include "name" .) }}
{{/*
Why this Job exists:
  kagent's RemoteMCPServer uses headersFrom to inject an Authorization header on
  every MCP request. headersFrom reads from a plain Secret — it does not support
  projected tokens or TokenRequest API calls. The Secret must contain the literal
  string "Bearer <token>".

  The token source is a kubernetes.io/service-account-token Secret (muster-sa.yaml),
  which the token controller populates asynchronously after the Secret is created.
  The base64-encoded token is stored under the "token" key and never expires, so it
  survives indefinitely without rotation.

  This Job bridges the two: it waits for the SA token Secret to be populated, then
  writes "Bearer <token>" into the headersFrom Secret. It runs as a post-install and
  post-upgrade hook so the Secret is (re)created on every Helm lifecycle event.

  All Agent, ModelConfig, and RemoteMCPServer CRs must be in the same namespace
  (kagent.namespaceOverride, defaulting to the release namespace) because the kagent
  controller watches a single namespace scope for these resources.
*/}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "name" . }}-kagent-muster-token-init
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-muster-token-init
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      serviceAccountName: kagent-muster-token-init
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init
          image: {{ printf "%s/%s:%s" .Values.agents.muster.kubectlImage.registry .Values.agents.muster.kubectlImage.repository .Values.agents.muster.kubectlImage.tag | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          command:
            - /bin/sh
            - -ec
            - |
              until kubectl get secret kagent-muster-client-satoken \
                -n {{ $kagentNs }} \
                -o jsonpath='{.data.token}' | grep -q .; do
                echo "waiting for SA token..."
                sleep 2
              done

              TOKEN=$(kubectl get secret kagent-muster-client-satoken \
                -n {{ $kagentNs }} \
                -o jsonpath='{.data.token}' | base64 -d)

              kubectl create secret generic {{ $tokenSecretName }} \
                -n {{ $kagentNs }} \
                --from-literal=token="Bearer ${TOKEN}" \
                --dry-run=client -o yaml | kubectl apply -f -
{{- end }}
