{{- if and .Values.kagent.enabled .Values.kagent.serviceMonitor.enabled }}
{{- $kagentNs := .Values.kagent.namespaceOverride | default .Release.Namespace }}
# ServiceMonitor for the kagent controller's controller-runtime Prometheus metrics.
# Requires the Prometheus Operator CRD (monitoring.coreos.com/v1).
# The controller exposes metrics at :8080/metrics (HTTP, no TLS) when
# METRICS_BIND_ADDRESS=:8080 and METRICS_SECURE=false are set.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "name" . }}-kagent-controller
  namespace: {{ $kagentNs }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
    observability.giantswarm.io/tenant: {{ .Values.kagent.serviceMonitor.tenant | default "giantswarm" }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/name: {{ include "name" . }}
  namespaceSelector:
    matchNames:
      - {{ $kagentNs }}
  endpoints:
    - port: http
      path: /metrics
      scheme: http
      interval: {{ .Values.kagent.serviceMonitor.interval | default "60s" }}
{{- end }}
