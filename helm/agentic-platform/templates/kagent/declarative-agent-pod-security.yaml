{{- if .Values.kagent.enabled }}
{{- $ns := .Values.kagent.namespaceOverride | default "kagent" }}
# Declarative agents created by bundled kagent subcharts (cilium-policy-agent,
# promql-agent, etc.) do not set securityContext in their Agent CR spec, so the
# kagent controller emits Deployments without the restricted-PSS fields GS clusters
# require. Worse, on the git-skills path the controller adds privileged: true to the
# main container; if a downstream mutating webhook then injects
# allowPrivilegeEscalation: false, the Deployment is rejected by the API server as
# self-contradictory.
#
# Fix: mutate the Agent CR (controller input) rather than the Deployment (output).
# Setting allowPrivilegeEscalation: false on the input trips the controller's own
# guard (allowPrivilegeEscalationExplicitlyFalse), which suppresses privileged: true
# before the Deployment is ever constructed. The resulting Deployment is
# restricted-PSS-clean without any further mutation.
#
# seccompProfile is intentionally absent here. Declarative agents execute bash
# commands through srt (Anthropic Sandbox Runtime), which uses bwrap internally.
# bwrap calls clone(CLONE_NEWUSER) to set up a user namespace; the RuntimeDefault
# seccomp profile blocks that syscall and bwrap fails immediately with:
#   bwrap: No permissions to create a new namespace
# Injecting RuntimeDefault would break every shell/bash tool invocation.
# policy-exception.yaml exempts kagent agent pods from restrict-seccomp-strict.
# declarative-agent-srt-settings.yaml handles the second bwrap failure
# (--proc /proc bind-mount inside unprivileged containers).
#
# The (type): "Declarative" condition anchor scopes the patch to Declarative agents
# only — BYO agents must not have spec.declarative injected.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ include "name" . }}-kagent-declarative-pod-security
  labels:
    {{- include "labels.common" . | nindent 4 }}
  annotations:
    policies.kyverno.io/title: Kagent declarative agent pod security
    policies.kyverno.io/description: >-
      Adds restricted-PSS securityContext fields to Agent CRs of type Declarative
      in the {{ $ns }} namespace when those fields are absent, so the kagent
      controller emits restricted-PSS-clean Deployments and never sets
      privileged: true on the git-skills path.
spec:
  rules:
  - name: add-declarative-agent-security-context
    match:
      any:
      - resources:
          kinds: ["kagent.dev/v1alpha2/Agent"]
          namespaces: [{{ $ns }}]
    mutate:
      patchStrategicMerge:
        spec:
          (type): "Declarative"
          declarative:
            deployment:
              +(podSecurityContext):
                runAsNonRoot: true
                runAsUser: 1001
              +(securityContext):
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
  # SandboxAgent shares the same AgentSpec fields (spec.declarative.deployment.*) but
  # is a distinct kind — the rule above does not match it. The agentsxk8s backend builds
  # the pod template directly from these fields, so mutating the CR input is the same
  # injection point as for regular Agent CRs.
  - name: add-sandbox-agent-security-context
    match:
      any:
      - resources:
          kinds: ["kagent.dev/v1alpha2/SandboxAgent"]
          namespaces: [{{ $ns }}]
    mutate:
      patchStrategicMerge:
        spec:
          (type): "Declarative"
          declarative:
            deployment:
              +(podSecurityContext):
                runAsNonRoot: true
                runAsUser: 1001
              +(securityContext):
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
{{- end }}
