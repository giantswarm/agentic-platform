{{- /*
META-PACKAGE render loop (app-of-apps).

For each enabled entry in `.Values.components`, emit either a Flux
OCIRepository + HelmRelease (gitops.engine=flux) or an Argo Application
(gitops.engine=argo). The version constraint comes from
`components.<name>.versionRange` (a VALUE, resolved at reconcile time) — never
from a Chart.yaml pin.

Each entry is fully self-describing; this template has no per-component
knowledge:
  chart/repository/versionRange — where to pull and which versions (filterTags
      optional, for dev-tag streams).
  valuesFrom    — name of the TOP-LEVEL values block passed straight through to
      this release's values. Omit for components that take no values.
  valuesKey     — when set, the valuesFrom block is NESTED under this key before
      being forwarded (e.g. valuesKey: kagent → {kagent: {…block…}}). Needed for
      GS wrapper charts that vendor an upstream chart as a SUBCHART of the same
      name: Helm only passes parent values to a subchart when they sit under the
      subchart's key. The top-level block (and every per-cluster override path and
      the connectivity chart's reads of it) stays flat — only the copy handed to
      this release is wrapped. global is injected at the wrapped top level so the
      subchart still inherits it. Omit for charts whose values are already at top
      level (muster, the GS-owned connectivity/crds charts).
  forwardAllValues — pass the WHOLE values tree (minus the meta keys) instead of
      a single block. Used by agentic-platform-connectivity, which reads many
      blocks (ingress, gateway, networkPolicy, kagent, klausGateway, …).
  injectGlobal  — inject `.Values.global` into the forwarded values (default
      true). Set false for components whose strict values.schema.json
      (additionalProperties:false) rejects an unexpected `global` key
      (agentic-platform-mcps, agent-sandbox).
  enabledFrom   — dotted path (two levels) to the existing on/off toggle. Omit to
      force-enable (crds, muster, connectivity).
  enabled       — explicit on/off, overrides enabledFrom. Set false to delegate a
      component to a cluster prerequisite (e.g. crds shipped by the platform base).
  dependsOn     — Flux dependsOn / Argo sync-wave ordering (CRD-owning component
      before its CR consumers). References that name a component which is toggled
      off are dropped at render time (see the componentEnabled helper) so an
      always-on consumer never blocks on a HelmRelease that was never rendered.
  postRenderers — optional Flux helm-controller postRenderers passed straight to
      the child HelmRelease (flux engine only). Used to work around upstream chart
      bugs without forking — e.g. kagent stamps the chart version into
      app.kubernetes.io/version, which helm-controller corrupts with the OCI
      +digest build-metadata (invalid in a label); a kustomize patch overwrites it.
  crds          — Helm CRD lifecycle policy for an app-owned-CRDs component (a chart
      that ships its CRDs in its own crds/ directory). Rendered into the child
      HelmRelease's spec.install.crds and spec.upgrade.crds (flux engine only).
      Set to CreateReplace so the app's CRDs upgrade atomically with the app at the
      same version (Helm otherwise never upgrades crds/-dir CRDs). Such a component
      owns its CRD version itself; its CR consumers dependsOn it instead. Argo
      applies crds/ unconditionally, so this field is flux-only.
*/ -}}
{{- $root := . -}}
{{- $g := .Values.gitops -}}
{{- if not (or (eq $g.engine "flux") (eq $g.engine "argo")) -}}
{{- fail (printf "gitops.engine=%s is invalid; must be one of: flux, argo" $g.engine) -}}
{{- end -}}
{{- /* Namespace the rendered Flux/Argo CRs live in. Defaults to the release
namespace; set gitops.namespace to a tenancy-exempt namespace (e.g.
flux-giantswarm on Giant Swarm clusters) so the child HelmReleases are not
rejected by the flux-multi-tenancy admission policy. gitops.targetNamespace
then routes the actual workloads to a separate namespace. */ -}}
{{- $ns := $g.namespace | default $root.Release.Namespace -}}
{{- $targetNs := $g.targetNamespace | default $root.Release.Namespace -}}
{{- range $key, $c := .Values.components }}
{{- $on := true }}
{{- with $c.enabledFrom }}{{- $on = index $root.Values (first (splitList "." .)) (last (splitList "." .)) }}{{- end }}
{{- /* explicit `enabled` overrides enabledFrom — lets a deployment delegate a
component to a cluster prerequisite (e.g. crds shipped by the platform base) */ -}}
{{- if hasKey $c "enabled" }}{{- $on = $c.enabled }}{{- end }}
{{- if $on }}
{{- $name := $c.chart }}
{{- /* passthrough values */ -}}
{{- $vals := dict }}
{{- if $c.forwardAllValues }}
{{- $vals = omit $root.Values "gitops" "components" }}
{{- else }}
{{- with $c.valuesFrom }}{{- $vals = index $root.Values . | default dict }}{{- end }}
{{- /* GS wrapper charts vendor the upstream chart as a subchart of the same name;
nest the forwarded block under that key so Helm hands it to the subchart. */ -}}
{{- with $c.valuesKey }}{{- $vals = dict . $vals }}{{- end }}
{{- if ne $c.injectGlobal false }}{{- $vals = merge (deepCopy $vals) (dict "global" $root.Values.global) }}{{- end }}
{{- end }}
{{- /* Drop dependsOn references to components that are toggled off, so an
always-on consumer (e.g. connectivity) does not block on a HelmRelease that was
never rendered. With app-owned CRDs a consumer dependsOn the opt-in component
that ships the CRD it needs; when that component is off it renders no CR for
that CRD either, so the dependency is moot. */ -}}
{{- $deps := list }}
{{- range ($c.dependsOn | default list) }}
{{- if include "agentic-platform.componentEnabled" (dict "root" $root "name" .) }}
{{- $deps = append $deps . }}
{{- end }}
{{- end }}
{{- if eq $g.engine "flux" }}
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" $root | nindent 4 }}
spec:
  interval: {{ $g.interval }}
  url: {{ printf "%s/%s" (trimSuffix "/" $c.repository) $c.chart }}
  ref:
    semver: {{ required (printf "components.%s.versionRange is required" $key) $c.versionRange | quote }}
    {{- with $c.filterTags }}
    filterTags:
      pattern: {{ .pattern | quote }}
      {{- with .extract }}
      extract: {{ . | quote }}
      {{- end }}
    {{- end }}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" $root | nindent 4 }}
spec:
  interval: {{ $g.interval }}
  releaseName: {{ $name }}
  targetNamespace: {{ $targetNs }}
  {{- with $g.serviceAccountName }}
  serviceAccountName: {{ . }}
  {{- end }}
  chartRef:
    kind: OCIRepository
    name: {{ $name }}
    namespace: {{ $ns }}
  install:
    createNamespace: true
    {{- with $c.crds }}
    crds: {{ . }}
    {{- end }}
    remediation:
      retries: {{ $g.retries }}
  upgrade:
    {{- with $c.crds }}
    crds: {{ . }}
    {{- end }}
    remediation:
      retries: {{ $g.retries }}
  {{- with $deps }}
  dependsOn:
    {{- range . }}
    - name: {{ . }}
    {{- end }}
  {{- end }}
  {{- with $c.postRenderers }}
  postRenderers:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  values:
    {{- toYaml $vals | nindent 4 }}
{{- else }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "labels.common" $root | nindent 4 }}
  annotations:
    # dependsOn has no Argo equivalent; CRDs (wave 0) apply and Establish before
    # their consumers (wave 1).
    argocd.argoproj.io/sync-wave: {{ if $deps }}"1"{{ else }}"0"{{ end }}
spec:
  project: {{ $g.argo.project }}
  destination:
    server: {{ $g.argo.server }}
    namespace: {{ $targetNs }}
  source:
    repoURL: {{ trimPrefix "oci://" $c.repository | quote }}
    chart: {{ $c.chart }}
    targetRevision: {{ required (printf "components.%s.versionRange is required" $key) $c.versionRange | quote }}
    helm:
      valuesObject:
        {{- toYaml $vals | nindent 8 }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
{{- end }}
{{- end }}
