{{- if and .Values.gateway.enabled .Values.gateway.parameters.enabled }}
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: {{ include "agentic-platform.parametersName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
# spec.deployment.spec is a strategic-merge patch the controller applies over
# the data-plane Deployment it generates. The container name must match the
# one stamped by the controller (`agentgateway`); a mismatch silently no-ops
# the overrides.
spec:
  deployment:
    spec:
      template:
        spec:
          securityContext:
            {{- toYaml .Values.gateway.parameters.podSecurityContext | nindent 12 }}
          {{- with .Values.gateway.parameters.dataPlaneVolumes }}
          volumes:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: agentgateway
              securityContext:
                {{- toYaml .Values.gateway.parameters.containerSecurityContext | nindent 16 }}
              {{- with .Values.gateway.parameters.dataPlaneEnv }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with .Values.gateway.parameters.dataPlaneVolumeMounts }}
              volumeMounts:
                {{- toYaml . | nindent 16 }}
              {{- end }}
{{- end }}
