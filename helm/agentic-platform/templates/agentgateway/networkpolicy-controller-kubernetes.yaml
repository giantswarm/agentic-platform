{{- if and .Values.networkPolicy.enabled (eq .Values.networkPolicy.flavor "kubernetes") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "name" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      agentgateway: agentgateway
      app.kubernetes.io/name: agentgateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              agentgateway: {{ .Values.gateway.name }}
      ports:
        - port: 9978
          protocol: TCP
    - from:
        - namespaceSelector: {}
      ports:
        - port: 9092
          protocol: TCP
        - port: 9093
          protocol: TCP
  egress:
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.kubernetes.apiServerCIDR | quote }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values: [kube-dns, coredns, k8s-dns-node-cache]
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 1053
          protocol: UDP
        - port: 1053
          protocol: TCP
{{- end }}
