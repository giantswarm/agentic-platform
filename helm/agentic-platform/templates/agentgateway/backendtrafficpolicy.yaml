{{- if and .Values.gateway.enabled .Values.gateway.httpRoute.parentRefs .Values.gateway.backendTrafficPolicy.enabled }}
{{- $fullName := .Values.gateway.name }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
    {{- with .Values.gateway.backendTrafficPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gateway.backendTrafficPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $fullName }}
  timeout:
    http:
      requestTimeout: {{ .Values.gateway.backendTrafficPolicy.timeout | quote }}
{{- end }}
