{{- if .Values.agentgateway.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentgateway-listenerset-{{ .Release.Name }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
rules:
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - listenersets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - listenersets/status
  verbs:
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentgateway-listenerset-{{ .Release.Name }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentgateway-listenerset-{{ .Release.Name }}
subjects:
- kind: ServiceAccount
  name: agentgateway-controller
  namespace: {{ .Release.Namespace }}
{{- end }}
