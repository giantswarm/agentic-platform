{{- if and (include "agentic-platform.ingress.agentgateway" .) .Values.networkPolicy.enabled (eq .Values.networkPolicy.flavor "cilium") }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      agentgateway: agentgateway
      app.kubernetes.io/name: agentgateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  ingress:
    # xDS from data-plane pods spawned by this controller. The provisioned
    # data-plane pods carry `gateway.networking.k8s.io/gateway-name`; only the
    # controller itself carries `agentgateway: agentgateway`, so the source
    # selector here must use the gateway-name label to match the data plane.
    - fromEndpoints:
        - matchLabels:
            gateway.networking.k8s.io/gateway-name: {{ .Values.gateway.name }}
      toPorts:
        - ports:
            - port: "9978"
              protocol: TCP
    # Prometheus / health scrape from cluster monitoring.
    - fromEntities: ["cluster"]
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
            - port: "9093"
              protocol: TCP
  egress:
    - toEntities: ["kube-apiserver"]
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ include "agentic-platform.musterFullname" . }}
      toPorts:
        - ports:
            - port: "8090"
              protocol: TCP
    {{- with .Values.gateway.jwksEgress }}
    {{- if .enabled }}
    # The controller fetches remote JWKS centrally (and distributes the keys to
    # the data plane via xDS), so it needs the same JWKS egress as the data plane.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ .namespace | quote }}
            {{- with .podSelector }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      toPorts:
        - ports:
            - port: {{ .port | toString | quote }}
              protocol: TCP
    {{- end }}
    {{- end }}
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: coredns
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: k8s-dns-node-cache
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
            - port: "1053"
              protocol: UDP
            - port: "1053"
              protocol: TCP
{{- end }}
