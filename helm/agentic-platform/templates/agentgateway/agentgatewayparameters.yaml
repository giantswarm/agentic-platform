{{- /*
  Gate the CR on its CRD being registered in the cluster. The agentgateway
  CRDs ship as agentgateway-crds sub-chart templates, so they install in the
  same Helm pass that renders this CR. On a first install the kind is not yet
  in the API, and Helm aborts the whole release ("no matches for kind
  AgentgatewayParameters"). Skipping it here lets the CRDs install; the next
  reconcile picks up the kind via discovery and creates the CR.
  NOTE: under `helm template` (no live cluster) pass
  --api-versions=agentgateway.dev/v1alpha1/AgentgatewayParameters to render it.
*/}}
{{- if and .Values.gateway.enabled .Values.gateway.parameters.enabled (.Capabilities.APIVersions.Has "agentgateway.dev/v1alpha1/AgentgatewayParameters") }}
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: {{ include "agentic-platform.parametersName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  service:
    type: {{ .Values.gateway.parameters.serviceType }}
  deployment:
    spec:
      template:
        spec:
          securityContext:
            {{- toYaml .Values.gateway.parameters.podSecurityContext | nindent 12 }}
          {{- with .Values.gateway.parameters.dataPlaneVolumes }}
          volumes:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: agentgateway
              securityContext:
                {{- toYaml .Values.gateway.parameters.containerSecurityContext | nindent 16 }}
              {{- with .Values.gateway.parameters.dataPlaneEnv }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with .Values.gateway.parameters.dataPlaneVolumeMounts }}
              volumeMounts:
                {{- toYaml . | nindent 16 }}
              {{- end }}
{{- end }}
