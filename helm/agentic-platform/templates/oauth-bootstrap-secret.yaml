{{- /*
Bootstrap Secret for muster's OAuth server.

Opt-in via `bootstrap.oauth.enabled` (default false). Generates random
values on FIRST install for the three keys that are not externally
coordinated (registration-token, oauth-encryption-key, valkey-password)
and re-emits the existing values on every subsequent reconcile via
`lookup`. `helm.sh/resource-policy: keep` ensures `helm uninstall` does
NOT delete the secret — losing it invalidates every issued token.

`dex-client-secret` is NOT auto-generated — it must match the secret
registered against the cluster's Dex / OIDC issuer. Provide it via
`bootstrap.oauth.dexClientSecret` (e.g. sourced from a Sealed Secret /
sops-encrypted value), or set `bootstrap.oauth.enabled: false` and use
the muster sub-chart's inline-values path instead.

Caveats:
  - `helm template` always sees `lookup` as nil and renders fresh
    random values; do NOT use rendered output as a GitOps source of
    truth for these fields.
  - `helm install --dry-run` on a fresh cluster shows fresh random
    values that differ from the actual install. Acceptable for the
    bootstrap case; not acceptable for credential rotation (use
    kubectl / external secret management for rotation).
*/}}
{{- if .Values.bootstrap.oauth.enabled }}
{{- $name := .Values.bootstrap.oauth.name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $existingData := (default (dict "data" dict) $existing).data }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "labels.common" . | nindent 4 }}
type: Opaque
data:
  dex-client-secret: {{ .Values.bootstrap.oauth.dexClientSecret | b64enc | quote }}
  registration-token: {{ default (randAlphaNum 32 | b64enc) (index $existingData "registration-token") | quote }}
  oauth-encryption-key: {{ default (randAlphaNum 32 | b64enc) (index $existingData "oauth-encryption-key") | quote }}
  valkey-password: {{ default (randAlphaNum 32 | b64enc) (index $existingData "valkey-password") | quote }}
{{- end }}
