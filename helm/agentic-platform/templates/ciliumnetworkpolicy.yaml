{{- if and .Values.networkPolicy.enabled (eq .Values.networkPolicy.flavor "cilium") }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "name" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  # The data-plane pod is rendered by the agentgateway controller from the
  # Gateway CR — its labels are not under Helm's control. The controller
  # consistently stamps app.kubernetes.io/name=agentgateway on the pod.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: agentgateway
  ingress:
    - fromEntities: ["cluster"]
      toPorts:
        - ports:
            - port: "{{ (index .Values.gateway.listeners 0).port }}"
              protocol: TCP
  egress:
    - toEntities: ["kube-apiserver"]
    # DNS: every kube-dns variant Giant Swarm workload clusters ship with.
    # `kube-dns` for vanilla CoreDNS, `coredns` for Cilium-managed CoreDNS
    # Deployments, `k8s-dns-node-cache` for NodeLocal DNSCache (port 1053
    # in addition to 53). Selecting only one variant silently drops DNS.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: coredns
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: k8s-dns-node-cache
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
            - port: "1053"
              protocol: UDP
            - port: "1053"
              protocol: TCP
    - toEntities: ["world"]
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
    # Reach upstream MCPServers and OIDC providers (Dex, etc.) fronted by an
    # in-cluster Gateway. `world` does not cover in-cluster LoadBalancer or
    # ClusterIP IPs.
    - toEntities: ["cluster"]
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
    # Reach muster on its aggregator port for OAuth + intrinsic tool calls.
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: muster
      toPorts:
        - ports:
            - port: "8090"
              protocol: TCP
    {{- with .Values.networkPolicy.additionalEgressCIDRs }}
    # CIDR-based egress for endpoints the `cluster` and `world` selectors
    # miss — typically the envoy-gateway VIP range when OIDC discovery
    # resolves to an in-cluster LoadBalancer IP whose Cilium identity
    # doesn't match either `cluster` or a labelled endpoint.
    - toCIDR:
        {{- toYaml . | nindent 8 }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.additionalEgressFQDNs }}
    # FQDN-based egress for DNS-resolved upstreams (Dex / OIDC public
    # endpoints, hosted MCPServers). Cilium ≥ 1.13 needs the matching
    # DNS visibility policy to be in place — usually shipped cluster-wide
    # via a CiliumClusterwideNetworkPolicy.
    - toFQDNs:
        {{- toYaml . | nindent 8 }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}
{{- end }}
