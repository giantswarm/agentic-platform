apiVersion: v2
name: agentic-platform
type: application
description: Giant Swarm agentic platform — MCP gateway deploy unit bundling muster and agentgateway.
home: https://github.com/giantswarm/agentic-platform
icon: https://s.giantswarm.io/app-icons/giantswarm/1/light.svg
sources:
  - https://github.com/giantswarm/agentic-platform
appVersion: "0.1.0"
version: 0.0.0-dev
annotations:
  io.giantswarm.application.audience: all
  io.giantswarm.application.managed: "true"
  io.giantswarm.application.team: bumblebee
dependencies:
  - name: muster
    version: 0.1.193
    repository: oci://giantswarmpublic.azurecr.io/giantswarm-catalog
  - name: agentgateway
    version: v1.2.1
    repository: oci://cr.agentgateway.dev/charts
  # Bundled Valkey for muster's OAuth session storage. Opt-in: enable when
  # the muster sub-chart's oauth.server.storage.type is set to "valkey".
  # `valkey.fullnameOverride: muster-valkey` keeps the primary Service at
  # `muster-valkey-primary` so the muster default URL matches without a
  # cross-subchart values override.
  - name: valkey
    version: 5.6.5
    repository: https://charts.bitnami.com/bitnami
    condition: valkey.enabled
