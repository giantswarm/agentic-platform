apiVersion: v2
name: agentic-platform
type: application
description: |
  Giant Swarm agentic platform — MCP gateway deploy unit, packaged as an
  app-of-apps meta-package. Renders each component (muster, agentgateway, kagent,
  klaus-gateway, valkey, agentic-platform-mcps, agent-sandbox) and the consumer-side
  connectivity layer as a Flux OCIRepository + HelmRelease (or Argo Application),
  with each component's version expressed as a value RANGE rather than a Chart.yaml
  pin — so a component release rolls forward with no PR to this chart. CRDs ship in
  the companion agentic-platform-crds chart; the Gateway API CRDs and GatewayClass
  remain cluster-level prerequisites — see README.
home: https://github.com/giantswarm/agentic-platform
icon: https://s.giantswarm.io/app-icons/giantswarm/1/light.svg
sources:
  - https://github.com/giantswarm/agentic-platform
appVersion: "0.1.0"
version: 1.1.34
annotations:
  io.giantswarm.application.audience: all
  io.giantswarm.application.managed: "true"
  io.giantswarm.application.team: bumblebee
# META-PACKAGE (app-of-apps): intentionally NO `dependencies:` block.
#
# Previously this was a Helm umbrella that pinned each component (muster,
# agentgateway, kagent, klaus-gateway, valkey, agentic-platform-mcps, agent-sandbox)
# to an exact version here. Helm bundles subchart .tgz archives at PACKAGE time, so
# picking up a new component release required a bump PR + umbrella re-release +
# gitops bump.
#
# Components are now rendered as per-component OCIRepository + HelmRelease (Flux)
# or Application (Argo) by templates/components.yaml, with the version CONSTRAINT
# expressed as a value (`components.<name>.versionRange`). Flux re-resolves the
# range on every reconcile, so a component release rolls forward with NO PR to
# this chart. The consumer-side wiring lives in the agentic-platform-connectivity
# chart, rendered the same way; the agentic-platform-crds chart is rendered as a
# HelmRelease that every other release `dependsOn` (CRD-before-CR ordering).
# See README "Meta-package release flow" and values.yaml `components`.
