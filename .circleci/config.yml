version: 2.1
orbs:
  architect: giantswarm/architect@6.10.0

jobs:
  test-ingress-modes:
    docker:
      # Bundles helm 3; same image family used by lint-chart in Makefile.gen.app.mk.
      - image: quay.io/giantswarm/helm-chart-testing:v3.0.0-rc.1
    steps:
      - checkout
      - run:
          name: verify ingress mode guards
          command: make verify-modes

workflows:
  test:
    jobs:
      - test-ingress-modes:
          # Run on every branch push (PR-time); tag-only release flow is separate.
          filters:
            tags:
              ignore: /.*/
  package-and-push-chart-on-tag:
    jobs:
    - architect/push-to-app-catalog:
        context: architect
        executor: app-build-suite
        name: package-and-push-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: 'agentic-platform'
          # Trigger job on git tag.
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
    - architect/push-to-app-catalog:
        context: architect
        executor: app-build-suite
        name: package-and-push-crds-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: 'agentic-platform-crds'
        # chart name differs from the repo (agentic-platform) — required by the
        # orb's chart-name check to publish a second chart from this repo.
        explicit_allow_chart_name_mismatch: true
          # Trigger job on git tag.
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
