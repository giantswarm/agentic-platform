version: 2.1
orbs:
  architect: giantswarm/architect@9.2.0

# Branch-time tests (ingress-mode guards, ct lint, ct install) moved to
# .github/workflows/chart-test.yaml so the required check context lives in
# GitHub Actions and can be wired into branch protection. CircleCI is kept
# for the tag-triggered release push only.

workflows:
  package-and-push-chart-on-tag:
    jobs:
    - architect/push-to-app-catalog:
        context: architect
        executor: app-build-suite
        name: package-and-push-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: 'agentic-platform'
          # Trigger job on git tag.
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
    - architect/push-to-app-catalog:
        context: architect
        executor: app-build-suite
        name: package-and-push-crds-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: 'agentic-platform-crds'
        # chart name differs from the repo (agentic-platform) — required by the
        # orb's chart-name check to publish a second chart from this repo.
        explicit_allow_chart_name_mismatch: true
          # Trigger job on git tag.
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
