# Repo-specific CircleCI jobs. The dynamic-config setup workflow in
# .circleci/config.yml deep-merges this file into the generated
# .circleci/workflows.yml at pipeline runtime (yq `*+`: maps merge, job lists
# append). devctl never touches this file.
#
# Generated job names available to reference in `requires`: build-chart,
# execute-chart-tests, execute-chart-tests-release, push-chart-release (all for
# the primary `agentic-platform` chart).
#
# What this file carries beyond the golden (single-chart) pipeline:
#   - test-ingress-modes: the `make verify-modes` + `make verify-meta` checks on
#     branches (ingress-mode guards + app-of-apps meta-package render)
#   - the standalone agentic-platform-connectivity chart (build, tag push), the
#     consumer-side wiring rendered by the meta-package as a HelmRelease
#   versioned in lockstep with agentic-platform off the same git tag. This
#   repo has no Dockerfile, so no chart depends on an image build.
#
# The agentic-platform-crds chart has been RETIRED — every component now ships
# its own CRDs (app-owned CRDs), so there is no longer a CRD-bundle chart to
# build/test/publish here.
version: 2.1

jobs:
  test-ingress-modes:
    # cimg/base: CircleCI's convenience image (no custom entrypoint, passwordless
    # sudo). We install a recent Helm here rather than reuse the lint-chart ct
    # image — ct v3.0.0-rc.1 bundles Helm ~3.3, which predates OCI dependency
    # support (GA in Helm 3.8), so `helm dependency build` of the oci:// sub-charts
    # fails with "no repository definition for oci://…".
    docker:
    - image: cimg/base:current
    steps:
    - checkout
    - run:
        name: install helm + make
        command: |
          command -v make >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq make)
          # Pinned (not `main`) so a mid-queue Helm minor can't change behaviour;
          # 3.17.x is well past OCI dependency GA (3.8). Avoids the curl|bash pattern.
          curl -fsSL https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz | tar xz -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version
    - run:
        name: verify ingress-mode guards + meta-package render
        # verify-modes (connectivity chart ingress guards) and verify-meta (root
        # app-of-apps render: no Chart.yaml pins, ranges as values, both engines,
        # pure renderer, pinned BOM) are the single source of truth, also run
        # locally. Neither chart has subcharts, so no `helm dependency build`.
        command: make verify-modes verify-meta

workflows:
  build:
    jobs:
    # ---- Ingress-mode guard (was the standalone `test` workflow before
    #      generation). Branch-only; the tag-publish flow is the chart jobs.
    - test-ingress-modes:
        filters:
          tags:
            ignore: /.*/

    # ---- agentic-platform-connectivity: the consumer-side wiring chart, versioned
    #      in lockstep with agentic-platform off the same git tag. Build + lint
    #      (persist, no push) on branches; push on tags. No ATS smoke job: like the
    #      generated agentic-platform pipeline this repo does not kind-install, and
    #      the chart renders CRs whose CRDs (agentgateway/kagent) are absent on bare
    #      kind — build-chart is the gate. No Dockerfile, so no image dependency.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: build-connectivity-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: agentic-platform-connectivity
        explicit_allow_chart_name_mismatch: true
        push_to_appcatalog: false
        push_to_oci_registry: false
        persist_chart_archive: true
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main

    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-connectivity-chart-release
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: agentic-platform-connectivity
        explicit_allow_chart_name_mismatch: true
        requires:
        - build-connectivity-chart
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
