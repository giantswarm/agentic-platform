# chart-testing (ct) configuration.
# https://github.com/helm/chart-testing/blob/main/doc/ct_lint-and-install.md
chart-dirs:
  - helm
remote: origin
target-branch: main
# kind clusters have no Cilium; switch to vanilla NetworkPolicy for all installs.
# test-netpol-kubernetes-values.yaml already sets these explicitly — no conflict.
helm-extra-args: >-
  --set networkPolicy.flavor=kubernetes
  --set muster.ciliumNetworkPolicy.enabled=false
  --set muster.networkPolicy.flavor=kubernetes
# 600s for pod readiness: muster + agentgateway + kagent (with bundled postgres)
# take longer than the 300s default.
timeout: 600
